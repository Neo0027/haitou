function fmt(v){return"¥"+Math.round(Number(v)).toLocaleString("ja-JP")}
function ts(s){return Object.values(s.a).reduce((a,b)=>a+b,0)}
function ad(s){return ts(s)*s.d}

// localStorage helpers
function load(){try{const d=JSON.parse(localStorage.getItem(SK));return d}catch(e){return null}}
function persist(stocks,lu,apiKey){localStorage.setItem(SK,JSON.stringify({stocks,lastUpdated:lu,apiKey}))}

// JSON extraction
function extractJSON(text){
  if(!text)return null;
  const c=text.replace(/```json\s*/gi,"").replace(/```/g,"").trim();
  try{const r=JSON.parse(c);if(Array.isArray(r))return r}catch(e){}
  let depth=0,start=-1;const arrs=[];
  for(let i=0;i<text.length;i++){
    if(text[i]==="["){if(!depth)start=i;depth++}
    else if(text[i]==="]"){depth--;if(!depth&&start>=0){arrs.push(text.slice(start,i+1));start=-1}}
  }
  for(const a of arrs.reverse()){try{const r=JSON.parse(a);if(Array.isArray(r)&&r.length&&r[0].t!=null)return r}catch(e){}}
  const items=[];const re=/"t"\s*:\s*"([^"]+)"\s*,\s*"d"\s*:\s*([\d.]+)/g;
  let m;while((m=re.exec(text))!==null)items.push({t:m[1],d:parseFloat(m[2])});
  return items.length?items:null;
}

function App(){
  const[stocks,setStocks]=useState(INIT);
  const[tab,setTab]=useState("dashboard");
  const[updating,setUpdating]=useState(false);
  const[upProg,setUpProg]=useState("");
  const[upLog,setUpLog]=useState([]);
  const[sortK,setSortK]=useState("annualDiv");
  const[sortA,setSortA]=useState(false);
  const[fAcc,setFAcc]=useState("all");
  const[lastUp,setLastUp]=useState(null);
  const[apiKey,setApiKey]=useState("");
  const[showM,setShowM]=useState(false);
  const[editI,setEditI]=useState(-1);
  const[form,setForm]=useState({t:"",n:"",d:"",shi:"",ki:"",chi:"",ra:""});
  const[delT,setDelT]=useState(null);

  useEffect(()=>{
    const d=load();
    if(d){
      if(d.stocks?.length)setStocks(d.stocks);
      if(d.lastUpdated)setLastUp(d.lastUpdated);
      if(d.apiKey)setApiKey(d.apiKey);
    }
  },[]);

  const sv=useCallback((s,lu,ak)=>{persist(s,lu||lastUp,ak||apiKey)},[lastUp,apiKey]);

  // Add/Edit
  const openAdd=()=>{setForm({t:"",n:"",d:"",shi:"",ki:"",chi:"",ra:""});setEditI(-1);setShowM(true)};
  const openEdit=(st)=>{
    setForm({t:st.t,n:st.n,d:String(st.d),shi:String(st.a.shi||""),ki:String(st.a.ki||""),chi:String(st.a.chi||""),ra:String(st.a.ra||"")});
    setEditI(stocks.findIndex(s=>s.t===st.t));setShowM(true);
  };
  const saveSt=()=>{
    if(!form.t||!form.n)return;
    const acc={};AK.forEach(k=>{const v=parseInt(form[k]);if(v>0)acc[k]=v});
    if(!Object.keys(acc).length)return;
    const entry={t:form.t.toUpperCase(),n:form.n,d:parseFloat(form.d)||0,a:acc};
    let up;
    if(editI>=0){up=stocks.map((s,i)=>i===editI?entry:s)}
    else{if(stocks.find(s=>s.t===entry.t)){alert("同じコードが既にあります");return}up=[...stocks,entry]}
    setStocks(up);sv(up);setShowM(false);
  };
  const confirmDel=()=>{const up=stocks.filter(s=>s.t!==delT);setStocks(up);sv(up);setDelT(null)};

  // Update dividends
  const updateDiv=async()=>{
    if(!apiKey){alert("APIキーを設定してください");return}
    setUpdating(true);setUpLog([]);
    const up=[...stocks];const bs=15;
    for(let i=0;i<up.length;i+=bs){
      const batch=up.slice(i,i+bs);
      setUpProg(`${i+1}〜${Math.min(i+bs,up.length)} / ${up.length}`);
      const inp=batch.map(s=>({t:s.t,n:s.n,d:s.d}));
      try{
        const resp=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1024,
            system:"あなたは日本株の配当情報データベースです。ユーザーが渡すJSON配列の各銘柄について、最新の予想年間1株配当金(円)に値を更新して返してください。確信がない銘柄はそのままの値を返してください。JSON配列以外のテキストは一切出力禁止です。マークダウンのバッククォートも不要です。",
            messages:[{role:"user",content:JSON.stringify(inp)+'\n上記の各銘柄のdを最新の予想年間1株配当金(円)に更新して返してください。形式: [{"t":"コード","d":数値}]'}]})
        });
        if(!resp.ok)throw new Error("HTTP "+resp.status);
        const data=await resp.json();
        let text="";if(Array.isArray(data.content))data.content.forEach(b=>{if(b.type==="text")text+=b.text});
        const res=extractJSON(text);
        if(res&&res.length){
          res.forEach(r=>{const tk=String(r.t);const nd=typeof r.d==="number"?r.d:parseFloat(r.d);
            const idx=up.findIndex(s=>s.t===tk);
            if(idx!==-1&&!isNaN(nd)&&nd>=0){const od=up[idx].d;up[idx]={...up[idx],d:nd};
              const ch=nd>od?"↑":nd<od?"↓":"→";
              setUpLog(prev=>[...prev,{t:tk,n:up[idx].n,od,nd,ch}])}});
          batch.forEach(s=>{if(!res.find(r=>String(r.t)===s.t))setUpLog(prev=>[...prev,{t:s.t,n:s.n,od:s.d,nd:s.d,ch:"?"}])});
        }else{batch.forEach(s=>setUpLog(prev=>[...prev,{t:s.t,n:s.n,od:s.d,nd:s.d,ch:"?"}]))}
      }catch(err){batch.forEach(s=>setUpLog(prev=>[...prev,{t:s.t,n:s.n,od:s.d,nd:s.d,ch:"!"}]))}
      if(i+bs<up.length)await new Promise(r=>setTimeout(r,1200));
    }
    const now=new Date().toISOString();setStocks(up);setLastUp(now);sv(up,now);setUpdating(false);setUpProg("完了！");
  };

  // Computed
  const totDiv=stocks.reduce((s,st)=>s+ad(st),0);
  const totSh=stocks.reduce((s,st)=>s+ts(st),0);
  const accT={};AK.forEach(k=>{accT[k]=0});
  stocks.forEach(st=>Object.entries(st.a).forEach(([k,v])=>{accT[k]=(accT[k]||0)+v*st.d}));

  const filt=fAcc==="all"?stocks:stocks.filter(s=>s.a[fAcc]);
  const sorted=[...filt].sort((a,b)=>{
    if(sortK==="annualDiv")return sortA?ad(a)-ad(b):ad(b)-ad(a);
    if(sortK==="div")return sortA?a.d-b.d:b.d-a.d;
    if(sortK==="shares")return sortA?ts(a)-ts(b):ts(b)-ts(a);
    if(sortK==="ticker")return sortA?a.t.localeCompare(b.t):b.t.localeCompare(a.t);
    return sortA?a.n.localeCompare(b.n):b.n.localeCompare(a.n);
  });
  const top10=[...stocks].sort((a,b)=>ad(b)-ad(a)).slice(0,10);
  const togSort=k=>{if(sortK===k)setSortA(!sortA);else{setSortK(k);setSortA(false)}};

  // ─── Render helpers ───
  const navBtn=(k,l)=>e("button",{key:k,style:{...S.nb,...(tab===k?S.na:{})},onClick:()=>setTab(k)},l);
  const accBadge=(k,v)=>e("span",{key:k,style:{fontSize:9,padding:"1px 4px",borderRadius:3,background:AC[k]+"20",color:AC[k],border:"1px solid "+AC[k]+"33"}},AS[k]+v);

  return e("div",{style:S.wrap},
    // Header
    e("header",{style:S.hdr},
      e("div",{style:S.logo},
        e("span",{style:{fontSize:16,color:"#c9a84c"}},"◆"),
        e("span",{style:{fontSize:14,fontWeight:700,letterSpacing:1.5}},"配当トラッカー"),
        e("span",{style:S.badge},stocks.length+"銘柄")),
      e("nav",{style:S.nav},navBtn("dashboard","ダッシュ"),navBtn("stocks","銘柄"),navBtn("update","更新"))),

    e("main",{style:S.main},

      // ═══ DASHBOARD ═══
      tab==="dashboard"&&e("div",null,
        e("div",{style:S.cg},
          e("div",{style:{...S.cd,borderLeft:"3px solid #c9a84c"}},
            e("p",{style:S.cl},"予想年間配当"),e("p",{style:S.cv},fmt(totDiv)),e("p",{style:S.cs},"月平均 "+fmt(totDiv/12))),
          e("div",{style:S.cd},
            e("p",{style:S.cl},"保有銘柄 / 総株数"),e("p",{style:S.cv},stocks.length,e("span",{style:{fontSize:12,color:"#8a877e"}},"銘柄")),e("p",{style:S.cs},totSh.toLocaleString()+"株")),
          ...AK.map(k=>e("div",{key:k,style:{...S.cd,borderLeft:"3px solid "+AC[k]}},
            e("p",{style:S.cl},AS[k]+"："+ACCOUNTS[k]),e("p",{style:{...S.cv,fontSize:17}},fmt(accT[k])),e("p",{style:S.cs},stocks.filter(s=>s.a[k]).length+"銘柄")))
        ),
        // TOP10
        e("div",{style:S.sec},e("h3",{style:S.st},"配当金額 TOP10"),
          e("div",{style:{marginTop:10}},
            ...top10.map((st,i)=>{const v=ad(st),mx=ad(top10[0]);
              return e("div",{key:st.t,style:{display:"flex",alignItems:"center",gap:7,marginBottom:4}},
                e("span",{style:{width:34,fontSize:10,color:"#6e6b63",textAlign:"right"}},st.t),
                e("span",{style:{width:80,fontSize:10,color:"#b0ad9f",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},st.n),
                e("div",{style:{flex:1,height:16,background:"#141620",borderRadius:3,overflow:"hidden"}},
                  e("div",{style:{width:(v/mx*100)+"%",height:"100%",background:"linear-gradient(90deg,#c9a84c,"+(i<3?"#e7c86e":"#8a7330")+")",borderRadius:3,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:4}},
                    e("span",{style:{fontSize:8,color:"#0a0c12",fontWeight:700}},fmt(v)))))}))),
        // Account bar
        e("div",{style:S.sec},e("h3",{style:S.st},"口座別割合"),
          e("div",{style:{display:"flex",height:24,borderRadius:5,overflow:"hidden",marginTop:8}},
            ...AK.map(k=>{const p=totDiv>0?accT[k]/totDiv*100:0;return p>0.5?e("div",{key:k,style:{width:p+"%",background:AC[k],display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#0a0c12",fontWeight:700}},p>6?AS[k]+" "+p.toFixed(0)+"%":""):null})),
          e("div",{style:{display:"flex",gap:10,marginTop:6,flexWrap:"wrap"}},
            ...AK.map(k=>e("div",{key:k,style:{display:"flex",alignItems:"center",gap:3}},
              e("div",{style:{width:7,height:7,borderRadius:2,background:AC[k]}}),
              e("span",{style:{fontSize:10,color:"#8a877e"}},AS[k]+"："+ACCOUNTS[k]+" ("+fmt(accT[k])+")"))))),
        lastUp&&e("p",{style:{fontSize:10,color:"#3a3830",textAlign:"center",marginTop:14}},"最終更新: "+new Date(lastUp).toLocaleString("ja-JP"))
      ),

      // ═══ STOCKS ═══
      tab==="stocks"&&e("div",null,
        e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:6}},
          e("div",{style:{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}},
            e("span",{style:{fontSize:10,color:"#6e6b63"}},"口座:"),
            e("button",{style:{...S.fb,...(fAcc==="all"?S.fa:{})},onClick:()=>setFAcc("all")},"全て"),
            ...AK.map(k=>e("button",{key:k,style:{...S.fb,...(fAcc===k?{...S.fa,borderColor:AC[k],color:AC[k]}:{})},onClick:()=>setFAcc(k)},AS[k]))),
          e("button",{style:S.pb,onClick:openAdd},"＋ 追加")),
        e("div",{style:{overflowX:"auto"}},
          e("table",{style:S.tbl},
            e("thead",null,e("tr",null,
              ...([["ticker","コード"],["name","銘柄"],["shares","株数"],["div","1株配当"],["annualDiv","年間配当"]].map(([k,l])=>
                e("th",{key:k,style:{...S.th,cursor:"pointer",userSelect:"none",textAlign:k==="name"?"left":"right"},onClick:()=>togSort(k)},l+(sortK===k?(sortA?" ▲":" ▼"):"")))),
              e("th",{style:S.th},"口座"),e("th",{style:{...S.th,width:50,textAlign:"center"}},""))),
            e("tbody",null,...sorted.map(st=>
              e("tr",{key:st.t},
                e("td",{style:{...S.td,textAlign:"right"}},e("span",{style:S.tk},st.t)),
                e("td",{style:S.td},st.n),
                e("td",{style:{...S.td,textAlign:"right"}},ts(st).toLocaleString()),
                e("td",{style:{...S.td,textAlign:"right",color:st.d>0?"#e0ddd5":"#e87561"}},st.d>0?"¥"+st.d:"無配"),
                e("td",{style:{...S.td,textAlign:"right",fontWeight:600,color:"#c9a84c"}},fmt(ad(st))),
                e("td",{style:S.td},e("div",{style:{display:"flex",gap:2,flexWrap:"wrap"}},...Object.entries(st.a).map(([k,v])=>accBadge(k,v)))),
                e("td",{style:{...S.td,textAlign:"center"}},
                  e("button",{style:S.ib,onClick:()=>openEdit(st),title:"編集"},"✎"),
                  e("button",{style:{...S.ib,color:"#e87561"},onClick:()=>setDelT(st.t),title:"削除"},"✕"))))),
            e("tfoot",null,e("tr",{style:{borderTop:"1px solid #2a2d3a"}},
              e("td",{colSpan:2,style:{...S.td,fontWeight:600}},"合計 ("+sorted.length+"銘柄)"),
              e("td",{style:{...S.td,textAlign:"right",fontWeight:600}},sorted.reduce((s,st)=>s+ts(st),0).toLocaleString()),
              e("td",{style:S.td}),
              e("td",{style:{...S.td,textAlign:"right",fontWeight:700,color:"#c9a84c",fontSize:13}},fmt(sorted.reduce((s,st)=>s+ad(st),0))),
              e("td",{colSpan:2,style:S.td})))))),

      // ═══ UPDATE ═══
      tab==="update"&&e("div",null,
        // API Key
        e("div",{style:S.sec},
          e("h3",{style:S.st},"APIキー設定"),
          e("p",{style:{fontSize:11,color:"#8a877e",marginTop:4}},"Anthropic APIキーを入力してください。端末内に保存されます。"),
          e("div",{style:{marginTop:8,display:"flex",gap:6}},
            e("input",{style:{...S.inp,flex:1,fontSize:12},type:"password",placeholder:"sk-ant-...",value:apiKey,
              onChange:ev=>{setApiKey(ev.target.value);sv(stocks,lastUp,ev.target.value)}}),
            apiKey&&e("span",{style:{fontSize:10,color:"#6ee7a8",alignSelf:"center"}},"✓ 設定済"))),
        // Update
        e("div",{style:{...S.sec,marginTop:10}},
          e("h3",{style:S.st},"配当情報を更新"),
          e("p",{style:{fontSize:11,color:"#8a877e",marginTop:4,lineHeight:1.6}},
            "AIが"+stocks.length+"銘柄の最新予想配当を取得します。"),
          lastUp&&e("p",{style:{fontSize:10,color:"#6e6b63",marginTop:4}},"前回: "+new Date(lastUp).toLocaleString("ja-JP")),
          e("div",{style:{marginTop:12,display:"flex",gap:8,alignItems:"center"}},
            e("button",{style:{...S.pb,opacity:updating?.5:1},disabled:updating,onClick:updateDiv},
              updating?"更新中...":"🔄 配当更新"),
            updating&&e("span",{style:{fontSize:11,color:"#c9a84c",animation:"pulse 1.2s infinite"}},upProg))),
        // Log
        upLog.length>0&&e("div",{style:{...S.sec,marginTop:10}},
          e("h3",{style:S.st},"更新結果"),
          e("div",{style:{overflowX:"auto",marginTop:6}},
            e("table",{style:S.tbl},
              e("thead",null,e("tr",null,e("th",{style:S.th},"コード"),e("th",{style:S.th},"銘柄"),e("th",{style:{...S.th,textAlign:"right"}},"旧"),e("th",{style:{...S.th,textAlign:"center"}},""),e("th",{style:{...S.th,textAlign:"right"}},"新"))),
              e("tbody",null,...upLog.map((l,i)=>
                e("tr",{key:i},
                  e("td",{style:S.td},e("span",{style:S.tk},l.t)),
                  e("td",{style:S.td},l.n),
                  e("td",{style:{...S.td,textAlign:"right"}},"¥"+l.od),
                  e("td",{style:{...S.td,textAlign:"center",fontSize:14,color:l.ch==="↑"?"#6ee7a8":l.ch==="↓"?"#e87561":"#6e6b63"}},l.ch),
                  e("td",{style:{...S.td,textAlign:"right",fontWeight:600,color:l.ch==="↑"?"#6ee7a8":l.ch==="↓"?"#e87561":"#e0ddd5"}},"¥"+l.nd)))))),
          e("div",{style:{marginTop:8,padding:"6px 10px",background:"#141620",borderRadius:4,fontSize:10,color:"#8a877e"}},
            upLog.filter(l=>l.ch==="↑").length+"件増配 / "+upLog.filter(l=>l.ch==="↓").length+"件減配 / "+upLog.filter(l=>l.ch==="→").length+"件変更なし")),
        // Reset
        e("div",{style:{textAlign:"center",marginTop:24}},
          e("button",{style:S.gb,onClick:()=>{if(confirm("初期データに戻す？")){setStocks(INIT);setLastUp(null);setUpLog([]);sv(INIT,null)}}},"初期データにリセット"))
      )
    ),

    // ─── Add/Edit Modal ───
    Modal({open:showM,onClose:()=>setShowM(false),title:editI>=0?"銘柄を編集":"銘柄を追加",children:
      e("div",null,
        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
          e("div",null,e("label",{style:S.lb},"証券コード"),
            e("input",{style:S.inp,value:form.t,disabled:editI>=0,placeholder:"例: 2914",onChange:ev=>setForm({...form,t:ev.target.value})})),
          e("div",null,e("label",{style:S.lb},"銘柄名"),
            e("input",{style:S.inp,value:form.n,placeholder:"例: JT",onChange:ev=>setForm({...form,n:ev.target.value})})),
          e("div",{style:{gridColumn:"1/-1"}},e("label",{style:S.lb},"予想年間1株配当(円)"),
            e("input",{style:S.inp,type:"number",value:form.d,placeholder:"例: 234",onChange:ev=>setForm({...form,d:ev.target.value})})),
          ...AK.map(k=>e("div",{key:k},e("label",{style:{...S.lb,color:AC[k]}},AS[k]+"："+ACCOUNTS[k]+" (株数)"),
            e("input",{style:S.inp,type:"number",value:form[k],placeholder:"0",onChange:ev=>setForm({...form,[k]:ev.target.value})})))
        ),
        e("div",{style:{display:"flex",justifyContent:"flex-end",gap:6,marginTop:14}},
          e("button",{style:S.gb,onClick:()=>setShowM(false)},"キャンセル"),
          e("button",{style:S.pb,onClick:saveSt},editI>=0?"保存":"追加")))}),

    // ─── Delete Modal ───
    Modal({open:!!delT,onClose:()=>setDelT(null),title:"銘柄を削除",children:
      e("div",null,
        e("p",{style:{fontSize:12,color:"#b0ad9f",marginBottom:14}},
          e("span",{style:S.tk},delT)," ",stocks.find(s=>s.t===delT)?.n," を削除しますか？"),
        e("div",{style:{display:"flex",justifyContent:"flex-end",gap:6}},
          e("button",{style:S.gb,onClick:()=>setDelT(null)},"キャンセル"),
          e("button",{style:{...S.pb,background:"linear-gradient(135deg,#e87561,#c25444)"},onClick:confirmDel},"削除")))})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
