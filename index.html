function fmt(v){return"¥"+Math.round(Number(v)).toLocaleString("ja-JP")}
function tsh(s){return Object.values(s.a).reduce((a,b)=>a+b,0)}
function adv(s){return tsh(s)*s.d}
function yld(s){return s.p>0?(s.d/s.p*100):0}
// Normalize m field: always returns number[] or empty array
function normM(m){
  if(!m)return[];
  if(Array.isArray(m))return m.map(Number).filter(v=>v>=1&&v<=12);
  if(typeof m==="object")return Object.values(m).map(Number).filter(v=>v>=1&&v<=12);
  return[];
}

// Fiscal year-end month → estimated payment months
// 期末配当: 決算月+3ヶ月後, 中間配当: 決算月-3ヶ月後
function fiscalToPayMonths(fm){
  if(!fm||fm<1||fm>12)return[];
  const yearEnd=((fm+2)%12)+1;   // 期末: M+3
  const interim=((fm-4+12)%12)+1; // 中間: M-3
  return[yearEnd,interim].sort((a,b)=>a-b);
}

// ─── Split detection ───
const SPLIT_RATIOS=[2,3,4,5,10,20,25,50];
function detectSplit(oldDiv,newDiv){
  if(!oldDiv||!newDiv||oldDiv<=0||newDiv<=0||newDiv>=oldDiv)return null;
  const ratio=Math.round(oldDiv/newDiv);
  if(SPLIT_RATIOS.includes(ratio)&&Math.abs(oldDiv/newDiv-ratio)<0.15)return ratio;
  return null;
}

// ─── Proxy fetch helper ───
async function proxyFetch(url){
  for(const px of PROXIES){
    try{
      const resp=await fetch(px(url),{signal:AbortSignal.timeout(12000)});
      if(!resp.ok)continue;
      const txt=await resp.text();
      if(!txt||txt.length<100)continue;
      // allorigins returns JSON with .contents, htmldriven returns JSON with .body
      try{
        const j=JSON.parse(txt);
        if(j&&typeof j.contents==="string"&&j.contents.length>100)return j.contents;
        if(j&&typeof j.body==="string"&&j.body.length>100)return j.body;
      }catch(e){}
      if(txt.includes("<")&&txt.includes("</"))return txt;
    }catch(e){continue}
  }
  return null;
}

  // ─── Yahoo Finance Scraping ───
  // Helper: extract from __PRELOADED_STATE__ JSON
  const extractPreloaded=(html,key)=>{
    const m=html.match(/__PRELOADED_STATE__\s*=\s*(\{[\s\S]*?\});\s*<\/script/);
    if(!m)return null;
    try{const j=JSON.parse(m[1]);
      // Navigate nested keys like "priceBoard.price"
      return key.split(".").reduce((o,k)=>o&&o[k],j);
    }catch(e){return null}

  const fetchStockFull=async(ticker)=>{
    let name=null,div=null,price=null,months=null;
    // Fetch main page for name + price
    try{
      const html=await proxyFetch("https://finance.yahoo.co.jp/quote/"+ticker+".T");
      if(html){
        const stripped=html.replace(/<[^>]+>/g," ").replace(/\s+/g," ");

        // ── Name extraction ──
        // Strategy 1: title tag — "ＪＴ【2914】：株価・株式情報 - Yahoo!ファイナンス"
        const tm=html.match(/<title>([^<]+)<\/title>/);
        if(tm){
          // Match up to full-width/half-width brackets, colon, pipe
          let nm=tm[1].match(/^(.+?)\s*[【\[（(：:|\-]/);
          if(nm)name=nm[1].trim();
          if(!name){nm=tm[1].match(/^(.+?)\s*(?:株式|$)/);if(nm)name=nm[1].trim()}
        }
        // Strategy 2: h1 tag
        if(!name){const h1=html.match(/<h1[^>]*>([^<]+)<\/h1>/i);if(h1)name=h1[1].replace(/[\s　]+/g," ").trim().split(/[【\[（(：:|]/)[0].trim()}
        // Strategy 3: og:title
        if(!name){const og=html.match(/property="og:title"\s+content="([^"]+)"/i);if(og)name=og[1].split(/[【\[（(：:|\-]/)[0].trim()}

        // ── Price extraction ──
        // Strategy 1: __PRELOADED_STATE__ JSON (most reliable)
        const prePrice=extractPreloaded(html,"priceBoard.price");
        if(prePrice)price=parseFloat(String(prePrice).replace(/,/g,""));
        // Strategy 2: class-based patterns
        if(!price){const cp=html.match(/class="[^"]*[Pp]rice[^"]*"[^>]*>([\d,]+(?:\.\d+)?)/i);if(cp)price=parseFloat(cp[1].replace(/,/g,""))}
        // Strategy 3: "現在値" nearby text
        if(!price){const kv=stripped.match(/現在値[^\d]{0,30}([\d,]+(?:\.\d+)?)/);if(kv)price=parseFloat(kv[1].replace(/,/g,""))}
        // Strategy 4: number before 前日比
        if(!price){const fb=stripped.match(/([\d,]{3,10}(?:\.\d+)?)\s*円?\s*(?:前日比|前営業日比)/);if(fb)price=parseFloat(fb[1].replace(/,/g,""))}
        // Strategy 5: JSON-LD structured data
        if(!price){const ld=html.match(/"price"\s*:\s*"?([\d,.]+)"?/i);if(ld)price=parseFloat(ld[1].replace(/,/g,""))}
      }
    }catch(e){console.log("fetchStockFull main error:",ticker,e)}
    // Fetch dividend page
    try{
      const html2=await proxyFetch("https://finance.yahoo.co.jp/quote/"+ticker+".T/dividend");
      if(html2){
        const stripped2=html2.replace(/<[^>]+>/g," ").replace(/\s+/g," ");

        // ── Dividend extraction ──
        // Pattern 1: "1株当たり配当金（会社予想）242.00円"
        let dm=stripped2.match(/1株当たり配当金[（(]会社予想[）)][^\d]{0,20}([\d,]+\.?\d*)\s*円/);
        // Pattern 2: without 会社予想
        if(!dm)dm=stripped2.match(/1株当たり配当金[^\d]{0,20}([\d,]+\.?\d*)\s*円/);
        // Pattern 3: 予想年間配当
        if(!dm)dm=stripped2.match(/予想[^\d]{0,5}年間配当[^\d]{0,10}([\d,]+\.?\d*)\s*円/);
        // Pattern 4: general patterns
        if(!dm)dm=stripped2.match(/年間配当[^\d]{0,15}([\d,]+\.?\d*)\s*円/);
        // Pattern 5: structured data
        if(!dm){const ld=html2.match(/"dividendPerShare"\s*:\s*"?([\d,.]+)"?/i);if(ld)dm=ld}
        if(dm)div=parseFloat(dm[1].replace(/,/g,""));

        // Price from dividend page if not found on main
        if(!price){
          const prePrice2=extractPreloaded(html2,"priceBoard.price");
          if(prePrice2)price=parseFloat(String(prePrice2).replace(/,/g,""));
          if(!price){
            let pm2=stripped2.match(/現在値[^\d]{0,30}([\d,]+(?:\.\d+)?)/);
            if(!pm2)pm2=stripped2.match(/([\d,]{3,10}(?:\.\d+)?)\s*円?\s*(?:前日比|前営業日比)/);
            if(pm2)price=parseFloat(pm2[1].replace(/,/g,""));

        // ── Extract fiscal year-end month → derive payment months ──
        // Look for "YYYY年MM月期" patterns (e.g. "2026年12月期" → fiscal month = 12)
        const periodMatches=[...stripped2.matchAll(/20\d{2}年(\d{1,2})月期/g)];
        if(periodMatches.length>0){
          const ms=periodMatches.map(m=>parseInt(m[1]));
          const freq={};ms.forEach(m=>{freq[m]=(freq[m]||0)+1});

          const fiscalMonth=parseInt(Object.entries(freq).sort((a,b)=>b[1]-a[1])[0][0]);
          if(fiscalMonth>=1&&fiscalMonth<=12){
            months=fiscalToPayMonths(fiscalMonth);

                  h("td",{style:{...S.td,textAlign:"right",color:"#8a877e"}},l.p?"¥"+l.p.toLocaleString():"---")))))),

          h("button",{style:S.gb,onClick:async()=>{if(confirm("初期データに戻す？")){setStocks(INIT);setLastUp(null);setUpLog([]);setSplits([]);await sv(INIT,null)}}},"初期データにリセット")))),

    // ─── Add/Edit Modal ───

      h("div",null,
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10},className:"modal-form"},
          h("div",null,
            h("label",{style:S.lb},"証券コード"),
            h("div",{style:{position:"relative"}},
              h("input",{style:S.inp,value:form.t,disabled:editI>=0,placeholder:"例: 2914",
                onChange:ev=>{if(editI<0)handleTickerChange(ev.target.value)}}),
              lookingUp&&h("span",{style:{...S.spinner,position:"absolute",right:8,top:8}})),

          h("div",null,h("label",{style:S.lb},"銘柄名",lookingUp?h("span",{style:{color:"#c9a84c",fontSize:8,marginLeft:4}}," 取得中..."):""),h("input",{style:{...S.inp,...(form.n&&editI<0?{borderColor:"#6ee7a822"}:{})},value:form.n,placeholder:editI<0?"自動取得されます":"銘柄名",onChange:ev=>setForm({...form,n:ev.target.value})})),
          h("div",{style:{gridColumn:"1/-1"}},h("label",{style:S.lb},"予想年間1株配当(円)"),h("input",{style:{...S.inp,...(form.d&&editI<0?{borderColor:"#6ee7a822"}:{})},type:"number",value:form.d,placeholder:editI<0?"自動取得されます":"例: 234",onChange:ev=>setForm({...form,d:ev.target.value})})),
          ...AK.map(k=>h("div",{key:k},h("label",{style:{...S.lb,color:AC[k]}},AS[k]+"："+ACCOUNTS[k]+" (株数)"),h("input",{style:S.inp,type:"number",value:form[k],placeholder:"0",onChange:ev=>setForm({...form,[k]:ev.target.value})})))),
        // Month selector
        h("div",{style:{marginTop:12}},
          h("label",{style:S.lb},"配当支払月（タップで選択）"),
          h("div",{style:{display:"flex",gap:3,flexWrap:"wrap",marginTop:4}},
            ...MN.map((mn,i)=>h("button",{key:i,type:"button",style:{...S.mBtn,...(form.m&&form.m.includes(i+1)?S.mBtnA:{})},onClick:()=>togMonth(i+1)},i+1)))),
        h("div",{style:{display:"flex",justifyContent:"flex-end",gap:6,marginTop:14}},
          h("button",{style:S.gb,onClick:closeModal},"キャンセル"),
          h("button",{style:S.pb,onClick:saveSt},editI>=0?"保存":"追加")))}),

    // ─── Delete Modal ───
    Modal({open:!!delT,onClose:()=>setDelT(null),title:"銘柄を削除",children:
      h("div",null,
        h("p",{style:{fontSize:12,color:"#b0ad9f",marginBottom:14}},h("span",{style:S.tk},delT)," ",stocks.find(s=>s.t===delT)?.n," を削除しますか？"),
        h("div",{style:{display:"flex",justifyContent:"flex-end",gap:6}},
          h("button",{style:S.gb,onClick:()=>setDelT(null)},"キャンセル"),
          h("button",{style:{...S.pb,background:"linear-gradient(135deg,#e87561,#c25444)"},onClick:confirmDel},"削除")))})
  );
}
